<svg width="2050" height="980" viewBox="0 0 2050 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Supreme Data Solutions</title>
  <desc id="logoDesc">Three equal-sized interlocking rounded rings above the company name in a diagonal chain, with the left ring higher, the center ring red, and the right ring lower.</desc>

  <rect x="390" y="110" width="500" height="290" rx="92" stroke="#111111" stroke-width="28"/>
  <rect x="710" y="170" width="500" height="290" rx="92" stroke="#CF171C" stroke-width="28"/>
  <rect x="1030" y="230" width="500" height="290" rx="92" stroke="#111111" stroke-width="28"/>

  <g font-family="Arial Black, Arial, sans-serif" font-size="154" letter-spacing="-5">
    <text x="88" y="720"><tspan fill="#111111">S</tspan><tspan fill="#CF171C">upreme</tspan></text>
    <text x="800" y="720"><tspan fill="#CF171C">D</tspan><tspan fill="#111111">ata</tspan></text>
    <text x="1188" y="720"><tspan fill="#111111">S</tspan><tspan fill="#CF171C">olutions</tspan></text>
  </g>

  <text x="1025" y="848" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic" font-weight="700" font-size="84" fill="#5A5450">Information Delivered</text>
</svg>
